services:
  postgres:
    image: postgres:16-alpine
    container_name: api-test-postgres
    environment:
      POSTGRES_USER: apiuser
      POSTGRES_PASSWORD: apipass
      POSTGRES_DB: api_test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiuser -d api_test_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  sample_api:
    build:
      context: ./sample_api
    container_name: api-test-sample-api
    environment:
      DATABASE_URL: postgresql://apiuser:apipass@postgres:5432/api_test_db
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
